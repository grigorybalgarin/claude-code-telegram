# Multi-agent registry.
# Each entry defines a specialized agent that the AgentRouter can dispatch to.
# Adding a new agent = one entry here + one prompt file in prompts/.

agents:
  - slug: deaify-text
    name: Text Humanizer
    department: content
    prompt_file: prompts/deaify-text.md
    enabled: true
    # Optional overrides (defaults come from bot settings):
    # working_directory: .
    # tools_allowlist: []

  - slug: competitor-analysis
    name: Competitor Analyst
    department: rd
    prompt_file: prompts/competitor-analysis.md
    enabled: true

  # --- ANALYTICS department (Phase 2) ---
  - slug: cc-analytics
    name: Cost Analytics
    department: analytics
    prompt_file: prompts/cc-analytics.md
    enabled: true

  - slug: chat-trends
    name: Chat Trends
    department: analytics
    prompt_file: prompts/chat-trends.md
    enabled: true

  - slug: blog-ideas
    name: Blog Ideas
    department: analytics
    prompt_file: prompts/blog-ideas.md
    enabled: true

  # --- VIDEO department (Phase 3) ---
  - slug: youtube-script
    name: YouTube Script Writer
    department: video
    prompt_file: prompts/youtube-script.md
    enabled: true

  # --- SALES department (Phase 3) ---
  - slug: tg-broadcast
    name: Telegram Broadcast
    department: sales
    prompt_file: prompts/tg-broadcast.md
    enabled: true

  - slug: deeplink-creator
    name: Deeplink Creator
    department: sales
    prompt_file: prompts/deeplink-creator.md
    enabled: true

# Routing rules: map (provider, event_type) or department label to an agent.
# The router tries rules top-down; first match wins.  Fallback = no agent (default handler).
routing_rules:
  # Example: GitHub PR events -> competitor-analysis (placeholder, change as needed)
  # - provider: github
  #   event_type: pull_request
  #   agent: competitor-analysis

  # Scheduled events can target agents by setting agent_slug in the job config.
  # Direct Telegram commands route via /agent <slug> or department keyword matching.
