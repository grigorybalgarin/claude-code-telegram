workspaces:
  # ── Core projects ──────────────────────────────────────────────────

  - path: ClaudeBot
    name: ClaudeBot
    aliases:
      - claude-bot
      - claude bot
      - telegram bot
      - bot
    priority: 100
    notes: |
      This is the Telegram bot itself (this project).
      Prefer small coherent changes, preserve the systemd deploy workflow under ops/server,
      keep logs redacted, and avoid widening runtime permissions.
      Deploy: ssh to server, run ops/server/deploy-app.sh as root.
    commands:
      install: make install
      dev: make dev
      build: .venv/bin/python -m compileall -q src
      lint: poetry run flake8 src --max-line-length 120 --count --statistics
      test: poetry run pytest tests/ -x -q --tb=short
      health: .venv/bin/python -m compileall -q src
      deploy: ssh root@194.87.44.239 "cd /srv/claude-bot/app && sudo -u claude-bot git pull origin main && systemctl restart claude-bot.service && sleep 3 && systemctl is-active claude-bot.service && journalctl -u claude-bot.service -n 20 --no-pager"
    operations:
      critical_steps:
        - health
        - линт
      diagnose:
        service_state: systemctl is-active claude-bot.service
        recent_errors: journalctl -u claude-bot.service -p err -n 10 --no-pager
        disk_usage: df -h /srv/claude-bot
        git_state: git -C /srv/claude-bot/app log --oneline -3
      self_heal_restart: true
      self_heal_verify_after_restart: true
      deploy_rollback_safe: true
      monitoring_interval_seconds: 300
      runbook_hints:
        service: "Проверь journalctl -u claude-bot.service -n 50 и systemctl status"
        dependency: "Запусти make install на сервере, проверь версию Python"
        code: "Запусти make lint и make test локально перед деплоем"
        config: "Проверь .env на сервере и workspace_profiles.yaml"
    services:
      - key: app
        name: ClaudeBot Service
        type: systemd
        unit: claude-bot.service
        logs_tail: 80

  - path: FreelanceAggregator
    name: FreelanceAggregator
    aliases:
      - freelance aggregator
      - aggregator
      - fa
    priority: 90
    notes: |
      Script-based Python product with a Telegram bot and FastAPI web panel.
      Prefer the existing run.sh/main.py workflow and keep the web panel + bot startup path intact.
    commands:
      install: pip install -r requirements.txt
      dev: ./run.sh
      start: python main.py
      health: python -m py_compile main.py bot.py web.py

  # ── Gr_dev umbrella ────────────────────────────────────────────────

  - path: Gr_dev
    name: Gr_dev
    aliases:
      - gr dev
      - gr-dev
      - grdev
    priority: 80
    notes: |
      Umbrella repo with several subprojects: freelance-aggregator, portfolio-site,
      github-profile, resume-bot. Route into the specific subproject when the request
      mentions one of them.

  - path: Gr_dev/freelance-aggregator
    name: Gr_dev Freelance Aggregator
    aliases:
      - gr freelance
      - gr aggregator
      - gr freelance aggregator
    priority: 85
    notes: |
      Nested freelance aggregator inside the Gr_dev umbrella.
      Use the existing Python entrypoint, keep changes scoped to this subproject.
    commands:
      install: pip install -r requirements.txt
      start: python main.py
      health: python -m py_compile main.py bot.py web.py

  - path: Gr_dev/resume-bot
    name: Resume Bot
    aliases:
      - resume bot
      - resume
      - gr resume
    priority: 83
    notes: |
      Resume/market analyzer Telegram bot in Gr_dev umbrella.
      Entry point: resume_bot.py, launcher: run_resume_bot.sh.
    commands:
      start: ./run_resume_bot.sh
      health: python -m py_compile resume_bot.py market_analyzer.py

  - path: Gr_dev/portfolio-site
    name: Portfolio Site
    aliases:
      - portfolio
      - portfolio site
      - gr portfolio
    priority: 81
    notes: |
      Static portfolio site in Gr_dev umbrella. Plain HTML/CSS, no build step.

  # ── MacProjects ────────────────────────────────────────────────────

  - path: MacProjects/Poolbill
    name: Poolbill
    aliases:
      - poolbill
      - poolych
      - billiards
      - pool game
    priority: 70
    notes: |
      Node monorepo with server, client, and bot workspaces.
      Prefer root workspace commands unless the request explicitly targets server, client, or bot.
    commands:
      dev: npm run dev
      build: npm run build
      typecheck: npm run typecheck
      test: npm run test
      health: npm run typecheck

  - path: MacProjects/RPG
    name: RPG
    aliases:
      - rpg
      - rpg game
    priority: 68
    notes: |
      Monorepo with apps/backend (Python FastAPI + Alembic + Docker) and apps/frontend.
      Backend uses requirements.txt, has tests and Docker Compose.
      Prefer working in apps/backend unless frontend is explicitly mentioned.
    commands:
      health: python -m py_compile apps/backend/app/*.py

  - path: "MacProjects/My project 1.0"
    name: Unity Game
    aliases:
      - unity
      - unity game
      - my project
      - game project
    priority: 65
    notes: |
      Unity C# game project. Scripts are in Assets/Scripts/.
      No CLI build commands available on server (Unity Editor required).
      Focus on C# script editing and code review when working here.

  - path: MacProjects/AIGeng
    name: AIGeng
    aliases:
      - aigeng
      - ai geng
      - ai gen
    priority: 60
    notes: |
      Python Telegram bot for AI generation. Uses python-telegram-bot.
      Entry point: main.py, has tests in tests/.
    commands:
      install: pip install -r requirements.txt
      start: python main.py
      health: python -m py_compile main.py
      test: python -m pytest tests/ -q

  - path: MacProjects/Game1488
    name: Game1488
    aliases:
      - game1488
    priority: 50
    notes: |
      Unity game project. Scripts in Assets/. No CLI build.

  - path: MacProjects/AQA_TEST
    name: AQA Tests
    aliases:
      - aqa
      - aqa test
      - aqa testing
    priority: 45
    notes: |
      QA/testing workspace with test exercises and practice projects.
